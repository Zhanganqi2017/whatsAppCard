<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>拼多多助力领RM20 TNG Credit</title>

  <!-- 👇 WhatsApp卡片核心OG标签（不变） -->
  <meta property="og:title" content="打开App，一起领奖励" />
  <meta property="og:description" content="我正在领TNG积分，快帮我一下！你也可以领！" />
  <!-- 替换为你的卡片封面图URL（必须HTTPS公网可访问） -->
  <meta property="og:image" content="https://your-domain.com/pdd-tng-card.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:type" content="website" />
  <!-- 这个URL是卡片页本身的地址（供WhatsApp爬取） -->
  <meta property="og:url" content="https://your-domain.com/pdd-card" />
  <meta property="og:site_name" content="APP" />

  <!-- Twitter卡片优化（增强兼容性） -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="打开App，一起领奖励" />
  <meta name="twitter:description" content="我正在领TNG积分，快帮我一下！你也可以领！" />
  <meta name="twitter:image" content="https://your-domain.com/pdd-tng-card.jpg" />
</head>
<body>
</body>
</html>
