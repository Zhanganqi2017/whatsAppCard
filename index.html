<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>标题标题标题标题标题标题</title>

  <!-- 👇 WhatsApp卡片核心OG标签（不变） -->
  <meta property="og:title" content="标题标题标题标题标题标题标题" />
  <meta property="og:description" content="描述文案描述文案描述文案描述文案描述文案描述文案" />
  <!-- 替换为你的卡片封面图URL（必须HTTPS公网可访问） -->
  <meta property="og:image" content="https://img-test.pddpic.com/garner-api-new/28bec379ac092ec87a6a9cdf43049861.jpeg" />
  <meta property="og:image:width" content="200" />
  <meta property="og:image:height" content="100" />
  <meta property="og:type" content="website" />
  <!-- 这个URL是卡片页本身的地址（供WhatsApp爬取） -->
  <meta property="og:url" content="https://your-domain.com/pdd-card" />
  <meta property="og:site_name" content="APP" />

  <!-- Twitter卡片优化（增强兼容性） -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="标题标题标题标题标题标题" />
  <meta name="twitter:description" content="描述文案描述文案描述文案描述文案描述文案描述文案" />
  <meta name="twitter:image" content="https://img-test.pddpic.com/garner-api-new/28bec379ac092ec87a6a9cdf43049861.jpeg" />
</head>
<body>

</body>
</html>
